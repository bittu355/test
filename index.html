<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        body { 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
        }
        canvas { 
            border: 1px solid white;
        }
    </style>
</head>
<body>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        // Create the pong paddle
        const paddleWidth = 10;
        const paddleHeight = 100;
        const playerPaddle = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: 'white',
            dy: 0
        };

        const computerPaddle = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            color: 'white'
        };

        // Create the pong ball
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 10,
            speed: 5,
            dx: 5,
            dy: 5,
            color: 'white'
        };

        // Draw the paddles and ball
        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.fillStyle = playerPaddle.color;
            context.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);
            context.fillStyle = computerPaddle.color;
            context.fillRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height);
            context.fillStyle = ball.color;
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            context.fill();
        }

        // Update the game objects
        function update() {
            // Move the player paddle
            playerPaddle.y += playerPaddle.dy;
            if (playerPaddle.y < 0) {
                playerPaddle.y = 0;
            } else if (playerPaddle.y + paddleHeight > canvas.height) {
                playerPaddle.y = canvas.height - paddleHeight;
            }

            // Move the computer paddle
            if (ball.y > computerPaddle.y + paddleHeight / 2) {
                computerPaddle.y += 4;
            } else {
                computerPaddle.y -= 4;
            }
            // Check for wall collision
            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {
                ball.dy *= -1;
            }

            // Check for paddle collision
            if (ball.x - ball.radius < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + paddleHeight) {
                ball.dx *= -1;
            } else if (ball.x + ball.radius > computerPaddle.x &&
                       ball.y > computerPaddle.y &&
                       ball.y < computerPaddle.y + paddleHeight) {
                ball.dx *= -1;
            }

            // Move the ball
            ball.x += ball.dx;
            ball.y += ball.dy;
        }

        // Control the player paddle with mouse
        canvas.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            playerPaddle.y = event.clientY - rect.top - paddleHeight / 2;
            if (playerPaddle.y < 0) playerPaddle.y = 0;
            if (playerPaddle.y + paddleHeight > canvas.height) playerPaddle.y = canvas.height - paddleHeight;
        });

        // Control the player paddle with keyboard
        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp') {
                playerPaddle.dy = -10;
            } else if (event.key === 'ArrowDown') {
                playerPaddle.dy = 10;
            }
        });

        document.addEventListener('keyup', () => {
            playerPaddle.dy = 0;
        });

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
