<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .game-wrapper {
            position: relative;
            display: inline-block;
        }

        canvas { 
            border: 3px solid white;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }

        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            gap: 40px;
        }

        .score {
            font-size: 1.5em;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            min-width: 150px;
        }

        .score-label {
            font-size: 0.8em;
            color: #aaa;
        }

        .score-value {
            font-size: 2em;
            font-weight: bold;
            color: #00ff00;
        }

        .instructions {
            margin-top: 20px;
            font-size: 0.9em;
            color: #ccc;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1em;
            background-color: #00ff00;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background-color: #00cc00;
            transform: scale(1.05);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 10px;
            z-index: 100;
            display: none;
            text-align: center;
        }

        .game-over h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #00ff00;
        }

        .game-over p {
            font-size: 1.2em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 PONG GAME 🎮</h1>
        
        <div class="game-wrapper">
            <canvas id="pong" width="800" height="400"></canvas>
            <div class="game-over" id="gameOver">
                <h2 id="winnerText">Game Over!</h2>
                <p id="scoreText"></p>
            </div>
        </div>

        <div class="scoreboard">
            <div class="score">
                <div class="score-label">PLAYER</div>
                <div class="score-value" id="playerScore">0</div>
            </div>
            <div class="score">
                <div class="score-label">COMPUTER</div>
                <div class="score-value" id="computerScore">0</div>
            </div>
        </div>

        <button onclick="resetGame()">Reset Game</button>

        <div class="instructions">
            <p><strong>Controls:</strong></p>
            <p>⬆️ Arrow Up / ⬇️ Arrow Down or 🖱️ Move Mouse</p>
            <p>First to 11 points wins!</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');
        const gameOverDiv = document.getElementById('gameOver');

        // Game state
        let gameActive = true;
        let playerScore = 0;
        let computerScore = 0;

        const paddleWidth = 10;
        const paddleHeight = 100;

        const playerPaddle = {
            x: 0,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0
        };

        const computerPaddle = {
            x: canvas.width - paddleWidth,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight
        };

        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 8,
            dx: 5,
            dy: 5,
            speed: 5
        };

        function draw() {
            // Clear canvas
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            context.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            context.setLineDash([10, 10]);
            context.beginPath();
            context.moveTo(canvas.width / 2, 0);
            context.lineTo(canvas.width / 2, canvas.height);
            context.stroke();
            context.setLineDash([]);

            // Draw paddles
            context.fillStyle = 'white';
            context.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);
            context.fillRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height);

            // Draw ball
            context.fillStyle = '#00ff00';
            context.beginPath();
            context.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            context.fill();
        }

        function update() {
            if (!gameActive) return;

            // Move player paddle
            playerPaddle.y += playerPaddle.dy;
            if (playerPaddle.y < 0) playerPaddle.y = 0;
            if (playerPaddle.y + paddleHeight > canvas.height) playerPaddle.y = canvas.height - paddleHeight;

            // Computer AI
            const computerCenter = computerPaddle.y + paddleHeight / 2;
            if (computerCenter < ball.y - 35) {
                computerPaddle.y += 4;
            } else if (computerCenter > ball.y + 35) {
                computerPaddle.y -= 4;
            }

            if (computerPaddle.y < 0) computerPaddle.y = 0;
            if (computerPaddle.y + paddleHeight > canvas.height) computerPaddle.y = canvas.height - paddleHeight;

            // Ball collision with top/bottom walls
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy *= -1;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Ball collision with paddles
            if (ball.x - ball.radius < playerPaddle.x + playerPaddle.width &&
                ball.y > playerPaddle.y &&
                ball.y < playerPaddle.y + paddleHeight) {
                ball.dx = Math.abs(ball.dx);
                ball.dx *= 1.05; // Increase speed slightly
                let collidePoint = ball.y - (playerPaddle.y + paddleHeight / 2);
                collidePoint = collidePoint / (paddleHeight / 2);
                ball.dy = collidePoint * ball.speed;
                ball.x = playerPaddle.x + playerPaddle.width + ball.radius;
            }

            if (ball.x + ball.radius > computerPaddle.x &&
                ball.y > computerPaddle.y &&
                ball.y < computerPaddle.y + paddleHeight) {
                ball.dx = -Math.abs(ball.dx);
                ball.dx *= 1.05;
                let collidePoint = ball.y - (computerPaddle.y + paddleHeight / 2);
                collidePoint = collidePoint / (paddleHeight / 2);
                ball.dy = collidePoint * ball.speed;
                ball.x = computerPaddle.x - ball.radius;
            }

            // Ball out of bounds
            if (ball.x < 0) {
                computerScore++;
                document.getElementById('computerScore').textContent = computerScore;
                resetBall();
                checkGameOver();
            } else if (ball.x > canvas.width) {
                playerScore++;
                document.getElementById('playerScore').textContent = playerScore;
                resetBall();
                checkGameOver();
            }

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * 5;
            ball.dy = (Math.random() - 0.5) * 5;
        }

        function checkGameOver() {
            if (playerScore >= 11) {
                gameActive = false;
                showGameOver('🎉 YOU WIN! 🎉', `Player: ${playerScore} - Computer: ${computerScore}`);
            } else if (computerScore >= 11) {
                gameActive = false;
                showGameOver('💻 COMPUTER WINS! 💻', `Player: ${playerScore} - Computer: ${computerScore}`);
            }
        }

        function showGameOver(title, scoreText) {
            document.getElementById('winnerText').textContent = title;
            document.getElementById('scoreText').textContent = scoreText;
            gameOverDiv.style.display = 'block';
        }

        function resetGame() {
            playerScore = 0;
            computerScore = 0;
            gameActive = true;
            gameOverDiv.style.display = 'none';
            document.getElementById('playerScore').textContent = '0';
            document.getElementById('computerScore').textContent = '0';
            resetBall();
        }

        function gameLoop() {
            draw();
            update();
            requestAnimationFrame(gameLoop);
        }

        // Mouse control
        canvas.addEventListener('mousemove', (event) => {
            const rect = canvas.getBoundingClientRect();
            playerPaddle.y = event.clientY - rect.top - paddleHeight / 2;
        });

        // Keyboard control
        document.addEventListener('keydown', (event) => {
            if (event.key === 'ArrowUp') playerPaddle.dy = -8;
            if (event.key === 'ArrowDown') playerPaddle.dy = 8;
        });

        document.addEventListener('keyup', () => {
            playerPaddle.dy = 0;
        });

        // Start the game
        gameLoop();
    </script>
</body>
</html>
